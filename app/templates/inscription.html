{% extends "base.html" %} {% block content %}
<section class="form-section">
  <div class="form-container">
    <h1>Créer un compte</h1>
    <p>Inscrivez-vous pour réserver vos billets et accéder aux événements.</p>

    <form action="{{ url_for('auth.signup') }}" method="post" class="auth-form">
      <div class="form-group">
        <label for="email">Adresse courriel</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Entrez votre courriel"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Entrez votre mot de passe"
          minlength="8"
          required
        />
      </div>

      <div class="form-group">
        <label for="password_repeat">Confirmer le mot de passe</label>
        <input
          type="password"
          id="password_repeat"
          name="password_repeat"
          placeholder="Confirmez votre mot de passe"
          minlength="8"
          required
        />
      </div>

      <button type="submit" class="btn-primary">S'inscrire</button>
    </form>

    <p class="form-link">
      Vous avez déjà un compte ?
      <a href="{{ url_for('auth.login') }}">Se connecter</a>
    </p>
  </div>
</section>
{% endblock %}

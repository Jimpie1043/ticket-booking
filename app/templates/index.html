{% extends "base.html" %}

{% block content %}
<section class="events-section">
    <h1>Events</h1>

    <div class="events-grid">
        {% for event in events %}
            <a href="{{ url_for('event.event_page', event_id=event.id) }}" class="event-card">
                <h2>{{ event.title }}</h2>
                <p>{{ event.date }}</p>
            </a>
        {% endfor %}
    </div>
</section>
{% endblock %}

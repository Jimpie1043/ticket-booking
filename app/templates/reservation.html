{% extends "base.html" %}

{% block content %}
<section class="reservation-section">
    <div class="form-container">
        <h1>Réserver un billet</h1>
        <p>Voulez-vous confirmer votre réservation pour cet événement ?</p>

        {% if event %}
            <div class="reservation-summary">
                <h2>{{ event.title }}</h2>
                <p><strong>Date :</strong> {{ event.date }}</p>
                <p><strong>Description :</strong> {{ event.description }}</p>
            </div>
        {% endif %}

        <form action="{{ url_for('booking.book', event_id=event.id) }}" method="post" class="auth-form">
            <button type="submit" class="btn-primary">Confirmer la réservation</button>
        </form>
    </div>
</section>
{% endblock %}
